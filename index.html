<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大消费行业跟踪看板</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-light: #f7fafd;
    --card-bg: #ffffff;
    --card-hover: #f0f7ff;
    --border: #d0dce8;
    --soft-border: #c5d8ea;
    --accent: #003778;
    --accent2: #2e7d9e;
    --accent3: #C00000;
    --accent4: #FF6464;
    --text: #1a2332;
    --text-muted: #5a6a7e;
    --tag-bg: #eef4fa;
    --up: #C00000;
    --down: #2e7d9e;
    --neutral: #5a6a7e;
    --light-blue: #C9F0FF;
    --deep-red: #C00000;
    --coral: #FF6464;
    --navy: #003778;
    --pale-blue: #e8f4fd;
    --sidebar-w: 280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: KaiTi, STKaiti, '楷体', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    background: #003778; border-bottom: 2px solid var(--deep-red);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 200; flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar h1 { font-size: 1.15rem; font-weight: 700; color: #fff; font-family: KaiTi, STKaiti, '楷体', Arial, sans-serif; }
  .topbar .badge { background: var(--deep-red); color: #fff; font-size: 0.68rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .search-input {
    background: #ffffff; border: 1px solid #c5d8ea; color: var(--text);
    padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; width: 200px; outline: none;
    font-family: KaiTi, STKaiti, '楷体', Arial, sans-serif;
  }
  .search-input:focus { border-color: var(--navy); box-shadow: 0 0 0 2px rgba(0,55,120,.15); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer;
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: #C9F0FF;
    transition: all .2s; font-family: KaiTi, STKaiti, '楷体', Arial, sans-serif;
  }
  .view-btn:hover, .view-btn.active { background: #fff; color: var(--navy); border-color: #fff; }

  .main-wrap { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; background: var(--bg-light); overflow: hidden;
  }
  .sidebar-filter {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .sf-btn {
    padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 500;
    background: #fff; border: 1px solid var(--soft-border); color: var(--text-muted);
    cursor: pointer; transition: all .2s; font-family: KaiTi, STKaiti, '楷体', Arial, sans-serif;
  }
  .sf-btn:hover, .sf-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-item {
    padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent;
    transition: all .15s; display: flex; align-items: center; gap: 10px;
  }
  .sidebar-item:hover { background: var(--pale-blue); }
  .sidebar-item.active { background: var(--pale-blue); border-left-color: var(--navy); }
  .si-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .si-dot.dot-黄金珠宝 { background: var(--deep-red); }
  .si-dot.dot-家电 { background: var(--navy); }
  .si-dot.dot-纺服 { background: #2e7d9e; }
  .si-dot.dot-食品饮料 { background: #27ae60; }
  .si-dot.dot-农业 { background: #e67e22; }
  .si-dot.dot-美护 { background: #8e44ad; }
  .si-dot.dot-轻工 { background: #c0392b; }
  .si-dot.dot-酒店旅游 { background: #2980b9; }
  .si-dot.dot-户外装备 { background: #f39c12; }
  .si-dot.dot-餐饮 { background: #e74c3c; }
  .si-info { flex: 1; min-width: 0; }
  .si-name { font-size: 0.88rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .si-sub { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .si-count { font-size: 0.62rem; color: #fff; background: var(--navy); border-radius: 99px; padding: 1px 6px; flex-shrink: 0; }

  .content { flex: 1; overflow-y: auto; padding: 0; }

  .detail-view { display: none; }
  .detail-view.active { display: block; }

  .detail-header {
    padding: 24px 28px 18px; border-bottom: 1px solid var(--border); background: #fff;
    position: sticky; top: 0; z-index: 50;
  }
  .dh-row1 { display: flex; align-items: center; justify-content: space-between; }
  .dh-name { font-size: 1.4rem; font-weight: 700; color: var(--navy); }
  .dh-code { font-size: 0.78rem; color: var(--text-muted); font-weight: 400; margin-left: 8px; font-family: Arial, sans-serif; }
  .dh-sector { font-size: 0.7rem; padding: 3px 10px; border-radius: 99px; font-weight: 600; white-space: nowrap; }
  .sector-黄金珠宝 { background: rgba(192,0,0,.08); color: #C00000; }
  .sector-家电 { background: rgba(0,55,120,.1); color: #003778; }
  .sector-纺服 { background: rgba(46,125,158,.1); color: #2e7d9e; }
  .sector-食品饮料 { background: rgba(39,174,96,.1); color: #27ae60; }
  .sector-农业 { background: rgba(230,126,34,.1); color: #e67e22; }
  .sector-美护 { background: rgba(142,68,173,.1); color: #8e44ad; }
  .sector-轻工 { background: rgba(192,0,0,.1); color: #C00000; }
  .sector-酒店旅游 { background: rgba(41,128,185,.1); color: #2980b9; }
  .sector-户外装备 { background: rgba(243,156,18,.1); color: #f39c12; }
  .sector-餐饮 { background: rgba(231,76,60,.1); color: #e74c3c; }
  .dh-sub { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }
  .dh-metrics-wrap { display: flex; gap: 0; margin-top: 14px; border: 1px solid var(--soft-border); border-radius: 10px; overflow: hidden; }
  .dh-group { flex: 1; display: flex; flex-direction: column; border-right: 2px solid var(--soft-border); }
  .dh-group:last-child { border-right: none; flex: 0.6; }
  .dh-group-title {
    font-size: 0.65rem; font-weight: 700; color: var(--navy); text-align: center;
    padding: 4px 6px; background: rgba(0,55,120,.07); border-bottom: 1px solid var(--soft-border);
    letter-spacing: .03em;
  }
  .dh-group-cells { display: flex; flex: 1; }
  .dh-metric {
    flex: 1; padding: 9px 8px; text-align: center; border-right: 1px solid var(--soft-border); background: var(--pale-blue);
  }
  .dh-metric:last-child { border-right: none; }
  .dh-metric .val { font-size: 0.9rem; font-weight: 700; font-family: Arial, KaiTi, sans-serif; }
  .dh-metric .val.up { color: var(--up); }
  .dh-metric .val.down { color: var(--down); }
  .dh-metric .val.neutral { color: #aaa; }
  .dh-metric .lbl { font-size: 0.62rem; color: var(--text-muted); margin-top: 2px; }

  .timeline { padding: 24px 28px 40px; }
  .timeline-title { font-size: 0.78rem; color: var(--text-muted); font-weight: 600; margin-bottom: 16px; letter-spacing: .05em; }
  .tl-item {
    position: relative; padding-left: 28px; padding-bottom: 28px;
    border-left: 2px solid var(--soft-border); margin-left: 8px;
  }
  .tl-item:last-child { border-left-color: transparent; padding-bottom: 0; }
  .tl-dot {
    position: absolute; left: -7px; top: 2px; width: 12px; height: 12px;
    border-radius: 50%; background: var(--navy); border: 2px solid #fff;
    box-shadow: 0 0 0 2px var(--navy);
  }
  .tl-dot.type-调研 { background: var(--deep-red); box-shadow: 0 0 0 2px var(--deep-red); }
  .tl-dot.type-业绩会 { background: #2e7d9e; box-shadow: 0 0 0 2px #2e7d9e; }
  .tl-dot.type-策略会 { background: #e67e22; box-shadow: 0 0 0 2px #e67e22; }
  .tl-dot.type-其他 { background: var(--coral); box-shadow: 0 0 0 2px var(--coral); }
  .tl-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .tl-date { font-size: 0.78rem; color: var(--text-muted); font-family: Arial, sans-serif; }
  .tl-type { font-size: 0.62rem; padding: 1px 7px; border-radius: 99px; font-weight: 600; }
  .type-tag-调研 { background: rgba(192,0,0,.1); color: var(--deep-red); }
  .type-tag-业绩会 { background: rgba(46,125,158,.1); color: #2e7d9e; }
  .type-tag-策略会 { background: rgba(230,126,34,.1); color: #e67e22; }
  .type-tag-其他 { background: rgba(255,100,100,.1); color: var(--coral); }
  .tl-card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,55,120,.05);
  }
  .tl-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .tl-tag {
    font-size: 0.68rem; padding: 2px 8px; border-radius: 99px;
    background: var(--tag-bg); border: 1px solid var(--soft-border); color: var(--text-muted);
  }
  .tl-tag.hot { background: rgba(192,0,0,.08); border-color: rgba(192,0,0,.25); color: #C00000; }
  .tl-tag.up { background: rgba(0,55,120,.08); border-color: rgba(0,55,120,.2); color: #003778; }
  .tl-section { margin-bottom: 10px; }
  .tl-section:last-child { margin-bottom: 0; }
  .tl-section-title { font-size: 0.72rem; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
  .tl-section-content { font-size: 0.82rem; color: #3a4a5e; line-height: 1.7; }

  .overview-view { display: none; padding: 20px 28px 40px; }
  .overview-view.active { display: block; }
  .overview-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(370px, 1fr)); gap: 14px; }
  .ocard {
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,55,120,.06);
  }
  .ocard::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--navy); border-radius: 12px 12px 0 0;
  }
  .ocard:hover { border-color: var(--navy); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,55,120,.1); }
  .ocard[data-sector="黄金珠宝"]::before { background: var(--deep-red); }
  .ocard[data-sector="家电"]::before { background: var(--navy); }
  .ocard[data-sector="纺服"]::before { background: #2e7d9e; }
  .ocard[data-sector="食品饮料"]::before { background: #27ae60; }
  .ocard[data-sector="农业"]::before { background: #e67e22; }
  .ocard[data-sector="美护"]::before { background: #8e44ad; }
  .ocard[data-sector="轻工"]::before { background: #C00000; }
  .ocard[data-sector="酒店旅游"]::before { background: #2980b9; }
  .ocard[data-sector="户外装备"]::before { background: #f39c12; }
  .ocard[data-sector="餐饮"]::before { background: #e74c3c; }
  /* ── 行业总结卡片 ── */
  .sector-summary {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #f8f9fc 0%, #f0f2f8 100%);
    border: 1px solid #d8dde6;
    border-radius: 10px;
    margin: 12px 0;
    overflow: hidden;
  }
  .ss-header {
    background: linear-gradient(90deg, var(--navy) 0%, #1a428a 100%);
    color: #fff;
    padding: 10px 16px;
  }
  .ss-title {
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .ss-body {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .ss-section p {
    font-size: .8rem;
    color: var(--text-secondary);
    line-height: 1.65;
    margin: 0;
    white-space: pre-wrap;
  }
  .ss-label {
    display: block;
    font-size: .75rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--navy);
  }
  @media (max-width: 900px) {
    .ss-body { grid-template-columns: 1fr; }
  }
  .ocard-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .ocard-name { font-size: 1rem; font-weight: 700; color: var(--navy); }
  .ocard-code { font-size: 0.68rem; color: var(--text-muted); font-weight: 400; margin-left: 6px; font-family: Arial, sans-serif; }
  .ocard-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  .ocard-metrics { display: flex; gap: 0; margin-bottom: 10px; background: var(--pale-blue); border-radius: 8px; overflow: hidden; }
  .ocard-metric { flex: 1; padding: 8px 10px; border-right: 1px solid var(--soft-border); text-align: center; }
  .ocard-metric:last-child { border-right: none; }
  .ocard-metric .val { font-size: 0.92rem; font-weight: 700; font-family: Arial, KaiTi, sans-serif; }
  .ocard-metric .val.up { color: var(--up); }
  .ocard-metric .val.down { color: var(--down); }
  .ocard-metric .val.neutral { color: var(--neutral); }
  .ocard-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .ocard-tag {
    font-size: 0.66rem; padding: 1px 7px; border-radius: 99px;
    background: var(--tag-bg); border: 1px solid var(--soft-border); color: var(--text-muted);
  }
  .ocard-tag.hot { background: rgba(192,0,0,.08); border-color: rgba(192,0,0,.25); color: #C00000; }
  .ocard-tag.up { background: rgba(0,55,120,.08); border-color: rgba(0,55,120,.2); color: #003778; }
  .ocard-latest { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
  .ocard-latest strong { color: var(--navy); }

  .compare-view { display: none; padding: 20px 28px 40px; }
  .compare-view.active { display: block; }
  .compare-header { margin-bottom: 16px; }
  .compare-header h2 { font-size: 1rem; color: var(--navy); margin-bottom: 8px; }
  .compare-selects { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .compare-select {
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--soft-border);
    font-size: 0.82rem; background: #fff; color: var(--text); min-width: 140px;
    font-family: KaiTi, STKaiti, '楷体', Arial, sans-serif;
  }
  .compare-add-btn {
    padding: 6px 14px; border-radius: 8px; border: 1px dashed var(--navy);
    background: var(--pale-blue); color: var(--navy); cursor: pointer; font-size: 0.82rem;
    font-family: KaiTi, STKaiti, '楷体', Arial, sans-serif;
  }
  .compare-table-wrap { overflow-x: auto; }
  .compare-table {
    width: 100%; border-collapse: collapse; font-size: 0.82rem;
  }
  .compare-table th {
    background: var(--navy); color: #fff; padding: 10px 14px; text-align: left;
    font-weight: 600; white-space: nowrap; position: sticky; top: 0;
  }
  .compare-table td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    vertical-align: top; line-height: 1.6; max-width: 280px;
  }
  .compare-table tr:hover td { background: var(--pale-blue); }
  .compare-table .row-label { font-weight: 600; color: var(--navy); white-space: nowrap; background: var(--bg-light); }

  footer {
    text-align: center; padding: 14px; color: var(--text-muted); font-size: 0.72rem;
    border-top: 1px solid var(--border); background: var(--bg-light); flex-shrink: 0;
  }

  @media (max-width: 800px) {
    .sidebar { width: 200px; }
    .grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .main-wrap { flex-direction: column; }
    .sidebar { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  }

  .sidebar-list::-webkit-scrollbar, .content::-webkit-scrollbar { width: 5px; }
  .sidebar-list::-webkit-scrollbar-thumb, .content::-webkit-scrollbar-thumb { background: #c5d8ea; border-radius: 99px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>📋 大消费行业跟踪看板</h1>
    <span class="badge" id="total-badge"></span>
  </div>
  <div class="topbar-right">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索公司 / 关键词…" oninput="onSearch()">
    <div class="view-toggle">
      <button class="view-btn active" onclick="switchView('overview',this)">公司总览</button>
      <button class="view-btn" onclick="switchView('detail',this)">公司详情</button>
      <button class="view-btn" onclick="switchView('compare',this)">公司对比</button>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="sidebar">
    <div class="sidebar-filter">
      <button class="sf-btn active" onclick="filterSector('all',this)">全部</button>
      <button class="sf-btn" onclick="filterSector('黄金珠宝',this)">黄金珠宝</button>
      <button class="sf-btn" onclick="filterSector('家电',this)">家电</button>
      <button class="sf-btn" onclick="filterSector('纺服',this)">纺服</button>
      <button class="sf-btn" onclick="filterSector('食品饮料',this)">食品饮料</button>
      <button class="sf-btn" onclick="filterSector('农业',this)">农业</button>
      <button class="sf-btn" onclick="filterSector('美护',this)">美护</button>
      <button class="sf-btn" onclick="filterSector('轻工',this)">轻工</button>
      <button class="sf-btn" onclick="filterSector('酒店旅游',this)">酒店旅游</button>
      <button class="sf-btn" onclick="filterSector('户外装备',this)">户外装备</button>
      <button class="sf-btn" onclick="filterSector('餐饮',this)">餐饮</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

  <div class="content" id="contentArea"></div>
</div>

<footer>数据来源于各公司公开调研纪要及业绩说明会，仅供研究参考，不构成投资建议。</footer>

<script>
const companies = [
  // ───── 黄金珠宝 ─────
  {
    id: "laopu", name: "老铺黄金", code: "02147.HK", sector: "黄金珠宝", sub: "中国古法黄金第一品牌（奢侈品定位）",
    records: [{
      date: "2025-04", type: "业绩会", title: "2024年年报业绩会",
      metrics: [
        { label: "2024收入", val: "~100亿", trend: "up" },
        { label: "2024收入YoY", val: "+166%", trend: "up" },
        { label: "2024净利润", val: "14.7亿", trend: "up" },
        { label: "2024净利YoY", val: "+253%", trend: "up" },
        { label: "店效", val: "2亿+", trend: "up" },
        { label: "同店增长", val: "+121%", trend: "up" },
        { label: "毛利率", val: "~40%", trend: "up" },
        { label: "门店数", val: "36家", trend: "up" },
        { label: "线上收入", val: "10.55亿/12.4%", trend: "up" }
      ],
      tags: ["收入翻倍","净利+253%","古法金奢侈品","店效2亿"],

let state = {
  currentView: 'overview',
  currentSector: 'all',
  currentSearch: '',
  selectedCompany: companies[0],
  compareIds: ['laopu', 'anta', 'zhoudafu'],
};

function sectorShort(s) { return {"黄金珠宝":"黄金珠宝", "家电":"家电", "纺服":"纺服", "食品饮料":"食品饮料", "农业":"农业", "美护":"美护", "轻工":"轻工", "酒店旅游":"酒店旅游", "户外装备":"户外装备", "餐饮":"餐饮"}[s] || "其他"; }

function filteredCompanies() {
  return companies.filter(c => {
    const sectorOk = state.currentSector === 'all' || c.sector === state.currentSector;
    const searchOk = !state.currentSearch ||
      c.name.includes(state.currentSearch) || c.code.toLowerCase().includes(state.currentSearch.toLowerCase()) ||
      c.sub.includes(state.currentSearch) ||
      c.records.some(r => r.tags.some(t => t.includes(state.currentSearch)) || r.focus.includes(state.currentSearch) || r.highlights.includes(state.currentSearch));
    return sectorOk && searchOk;
  });
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  const fcs = filteredCompanies();
  list.innerHTML = fcs.map(c => {
    const active = state.selectedCompany && state.selectedCompany.id === c.id ? 'active' : '';
    const dotCls = 'dot-' + sectorShort(c.sector);
    const recCount = c.records.length;
    return `<div class="sidebar-item ${active}" onclick="selectCompany('${c.id}')">
      <span class="si-dot ${dotCls}"></span>
      <div class="si-info">
        <div class="si-name">${c.name}</div>
        <div class="si-sub">${c.sub}</div>
      </div>
      <span class="si-count">${recCount}</span>
    </div>`;
  }).join('');
  document.getElementById('total-badge').textContent = fcs.length + '家公司';
}

function renderContent() {
  const area = document.getElementById('contentArea');
  if (state.currentView === 'detail') renderDetailView(area);
  else if (state.currentView === 'overview') renderOverview(area);
  else if (state.currentView === 'compare') renderCompare(area);
}

function renderDetailView(area) {
  const c = state.selectedCompany;
  if (!c) { area.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">请从左侧选择一家公司</div>'; return; }
  const sKey = sectorShort(c.sector);
  const latestRec = c.records[0];
  const m = latestRec.metrics;
  const groups = [
    { title: "最新报告期", items: m.slice(0,4) },
    { title: "关键指标", items: m.slice(4,8) },
    { title: "其他", items: [m[8]] }
  ];
  const metricsHtml = `<div class="dh-metrics-wrap">${
    groups.map(g => `
      <div class="dh-group">
        <div class="dh-group-title">${g.title}</div>
        <div class="dh-group-cells">${
          g.items.map(mi => `<div class="dh-metric"><div class="val ${mi ? mi.trend : 'neutral'}">${mi ? mi.val : '—'}</div><div class="lbl">${mi ? mi.label : ''}</div></div>`).join('')
        }</div>
      </div>`).join('')
  }</div>`;

  const timelineHtml = c.records.map(r => {
    const tagsHtml = r.tags.map((t, i) => `<span class="tl-tag ${i < 2 ? 'hot' : 'up'}">${t}</span>`).join('');
    return `<div class="tl-item">
      <div class="tl-dot type-${r.type}"></div>
      <div class="tl-header">
        <span class="tl-date">${r.date}</span>
        <span class="tl-type type-tag-${r.type}">${r.type}</span>
        <span style="font-size:.8rem;font-weight:600;color:var(--text)">${r.title}</span>
      </div>
      <div class="tl-card">
        <div class="tl-tags">${tagsHtml}</div>
        <div class="tl-section"><div class="tl-section-title">📌 市场关注点</div><div class="tl-section-content">${r.focus}</div></div>
        <div class="tl-section"><div class="tl-section-title">📊 核心亮点</div><div class="tl-section-content">${r.highlights}</div></div>
        <div class="tl-section"><div class="tl-section-title">🎯 公司指引 & 展望</div><div class="tl-section-content">${r.guidance}</div></div>
        <div class="tl-section"><div class="tl-section-title">💡 深度背景</div><div class="tl-section-content">${r.extra}</div></div>
      </div>
    </div>`;
  }).join('');

  area.innerHTML = `<div class="detail-view active">
    <div class="detail-header">
      <div class="dh-row1">
        <div>
          <span class="dh-name">${c.name}</span><span class="dh-code">${c.code}</span>
        </div>
        <span class="dh-sector sector-${sKey}">${c.sector}</span>
      </div>
      <div class="dh-sub">${c.sub}</div>
      ${metricsHtml}
    </div>
    <div class="timeline">
      <div class="timeline-title">跟踪记录（${c.records.length} 条）</div>
      ${timelineHtml}
    </div>
  </div>`;
}

function renderOverview(area) {
  const fcs = filteredCompanies();
  // 按板块分组
  const sectorOrder = ["黄金珠宝","家电","纺服","食品饮料","农业","美护","轻工","酒店旅游","户外装备","餐饮"];
  const grouped = {};
  fcs.forEach(c => {
    const s = c.sector;
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(c);
  });
  let html = '';
  sectorOrder.forEach(sector => {
    const cs = grouped[sector];
    if (!cs || cs.length === 0) return;
    const sm = sectorSummaries[sector];
    // 行业总结卡片
    if (sm) {
      html += `<div class="sector-summary">
        <div class="ss-header"><span class="ss-title">${sector} · 行业概览</span></div>
        <div class="ss-body">
          <div class="ss-section"><span class="ss-label">行业情况</span><p>${sm.situation}</p></div>
          <div class="ss-section"><span class="ss-label">市场关注</span><p>${sm.focus}</p></div>
          <div class="ss-section"><span class="ss-label">催化关注</span><p>${sm.catalyst}</p></div>
        </div>
      </div>`;
    }
    // 公司卡片
    const cards = cs.map(c => {
      const sKey = sectorShort(c.sector);
      const latest = c.records[0];
      const keyMetrics = [
        latest.metrics[0], latest.metrics[1],
        latest.metrics[4], latest.metrics[5],
      ].filter(Boolean);
      const metricsHtml = keyMetrics.map(m => `
        <div class="ocard-metric"><div class="val ${m.trend}">${m.val}</div><div class="lbl">${m.label}</div></div>`).join('');
      const tagsHtml = latest.tags.map((t, i) => `<span class="ocard-tag ${i < 2 ? 'hot' : 'up'}">${t}</span>`).join('');
      const recInfo = c.records.length > 1
        ? `<span class="ocard-latest">最新：${latest.title}（${latest.date}） · 共 <strong>${c.records.length}</strong> 条记录</span>`
        : `<span class="ocard-latest">最新：${latest.title}（${latest.date}）</span>`;
      return `<div class="ocard" data-sector="${c.sector}" onclick="selectCompany('${c.id}');switchView('detail',document.querySelector('.view-btn'))">
        <div class="ocard-header">
          <div><span class="ocard-name">${c.name}</span><span class="ocard-code">${c.code}</span><div class="ocard-sub">${c.sub}</div></div>
          <span class="dh-sector sector-${sKey}">${c.sector}</span>
        </div>
        <div class="ocard-metrics">${metricsHtml}</div>
        <div class="ocard-tags">${tagsHtml}</div>
        ${recInfo}
      </div>`;
    }).join('');
    html += cards;
  });

  area.innerHTML = `<div class="overview-view active">
    <div class="overview-title">共 ${fcs.length} 家公司 · 点击卡片查看详情</div>
    <div class="grid">${html}</div>
  </div>`;
}

function renderCompare(area) {
  const selectsHtml = state.compareIds.map((id, i) =>
    `<select class="compare-select" onchange="updateCompare(${i}, this.value)">${companies.map(c => `<option value="${c.id}" ${c.id === id ? 'selected' : ''}>${c.name}</option>`).join('')}</select>`
  ).join('');
  const addBtn = state.compareIds.length < 6 ? `<button class="compare-add-btn" onclick="addCompare()">+ 添加公司</button>` : '';

  const compCompanies = state.compareIds.map(id => companies.find(c => c.id === id)).filter(Boolean);
  const rows = [
    { label: "板块", fn: c => c.sector },
    { label: "细分领域", fn: c => c.sub },
    { label: "最新报告期", fn: c => c.records[0] ? c.records[0].date + ' ' + c.records[0].title : '-' },
    { label: "核心指标", fn: c => {
        const m = c.records[0] ? c.records[0].metrics : [];
        return m.map(mi => `<span style="color:${mi.trend==='up'?'var(--up)':mi.trend==='down'?'var(--down)':'#aaa'}">${mi.label}: <b>${mi.val}</b></span>`).join('<br>') || '—';
      }
    },
    { label: "关键标签", fn: c => c.records[0] ? c.records[0].tags.map(t => `<span class="ocard-tag hot" style="margin:1px">${t}</span>`).join(' ') : '-' },
    { label: "市场关注点", fn: c => c.records[0] ? c.records[0].focus : '-' },
    { label: "核心亮点", fn: c => c.records[0] ? c.records[0].highlights : '-' },
  ];
  const thHtml = '<th>维度</th>' + compCompanies.map(c => `<th>${c.name}<br><span style="font-weight:400;font-size:.7rem">${c.code}</span></th>`).join('');
  const tbHtml = rows.map(r => `<tr><td class="row-label">${r.label}</td>${compCompanies.map(c => `<td>${r.fn(c)}</td>`).join('')}</tr>`).join('');

  area.innerHTML = `<div class="compare-view active">
    <div class="compare-header">
      <h2>消费行业横向对比</h2>
      <div class="compare-selects">${selectsHtml}${addBtn}</div>
    </div>
    <div class="compare-table-wrap">
      <table class="compare-table"><thead><tr>${thHtml}</tr></thead><tbody>${tbHtml}</tbody></table>
    </div>
  </div>`;
}

}

  document.getElementById('contentArea').innerHTML = '<div style="padding:20px;color:red">Error: ' + e.message + '</div>';
});
renderSidebar();
  if (state.currentView !== 'detail') renderContent();
}

function updateCompare(idx, val) {
  state.compareIds[idx] = val;
  renderContent();
}

function addCompare() {
  const unused = companies.find(c => !state.compareIds.includes(c.id));
  if (unused) { state.compareIds.push(unused.id); renderContent(); }
}


// Error handling for debugging
window.addEventListener('error', function(e) {
  console.error('Global error:', e.message);
  document.getElementById('contentArea').innerHTML = '<div style="padding:20px;color:red">Error: ' + e.message + '</div>';
});
renderSidebar();
renderContent();
</script>
</body>
</html>
